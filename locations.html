<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Night City Public Terminal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <style>
        #fullscreen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #fullscreen-image {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border: 1px solid var(--border);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }
    </style>
</head>

<body>
    <nav style="display: flex; align-items: center; padding: 10px; background-color: #333; color: white;">
        <a href="index.html" style="text-decoration: none; color: white; font-weight: bold; margin-right: 20px;">Terminal</a>

        <ul style="display: flex; list-style: none; margin: 0 auto; padding: 0; flex-grow: 1; justify-content: center;">
            <li style="margin: 0 10px;"><a href="privacy.html" style="text-decoration: none; color: white;">Privacy</a></li>
            <li style="margin: 0 10px;"><a href="news.html" style="text-decoration: none; color: white;">News</a></li>
            <li style="margin: 0 10px;"><a href="map.html" style="text-decoration: none; color: white;">Map</a></li>
            <li style="margin: 0 10px;"><a href="npc.html" style="text-decoration: none; color: white;">Dossier</a></li>
            <li style="margin: 0 10px;"><a href="locations.html" style="text-decoration: none; color: white;">Locations</a></li>
            <li style="margin: 0 10px;"><a href="scan.html" style="text-decoration: none; color: white;">Scan</a></li>
        </ul>
    </nav>

    <h2 style="margin: 2rem 0 1rem;">Locations</h2>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card" onclick="showFullScreen('images/pegasys1.png')">
                    <img src="images/pegasys1.png" class="card-img-top" alt="Pegasys Bar">
                    <div class="card-body">
                        <h5 class="card-title">Pegasys Bar</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card" onclick="showFullScreen('images/militech.png')">
                    <img src="images/militech.png" class="card-img-top" alt="Image 2">
                    <div class="card-body">
                        <h5 class="card-title">Image 2</h5>
                    </div>
                </div>
            </div>
            <!-- Add more cards as needed -->
        </div>
    </div>

    <div id="fullscreen" onclick="hideFullScreen()">
        <img id="fullscreen-image" src="" alt="Fullscreen Image">
    </div>

    <script>
        function showFullScreen(imageUrl) {
            document.getElementById('fullscreen-image').src = imageUrl;
            const el = document.getElementById('fullscreen');
            el.style.display = 'flex';
        }

        function hideFullScreen() {
            document.getElementById('fullscreen').style.display = 'none';
        }
    </script>
</body>

</html>
