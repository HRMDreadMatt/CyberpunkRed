<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Night City Public Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .ping-ring {
            position: fixed;
            border-radius: 50%;
            border: 2px solid var(--accent);
            box-shadow: 0 0 6px var(--accent);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
        }
    </style>
</head>

<body>
    <nav style="display: flex; align-items: center; padding: 10px; background-color: #333; color: white;">
        <a href="index.html"
            style="text-decoration: none; color: white; font-weight: bold; margin-right: 20px;">Terminal</a>

        <ul style="display: flex; list-style: none; margin: 0 auto; padding: 0; flex-grow: 1; justify-content: center;">
            <li style="margin: 0 10px;"><a href="privacy.html" style="text-decoration: none; color: white;">Privacy</a>
            </li>
            <li style="margin: 0 10px;"><a href="news.html" style="text-decoration: none; color: white;">News</a></li>
            <li style="margin: 0 10px;"><a href="map.html" style="text-decoration: none; color: white;">Map</a></li>
            <li style="margin: 0 10px;"><a href="npc.html" style="text-decoration: none; color: white;">Dossier</a></li>
            <li style="margin: 0 10px;"><a href="locations.html"
                    style="text-decoration: none; color: white;">Locations</a></li>
            <li style="margin: 0 10px;"><a href="scan.html" style="text-decoration: none; color: white;">Scan</a></li>
        </ul>
    </nav>

    <h2 style="margin: 2rem 0 1rem;">Districts of Night City</h2>
    <div class="container">
        <div class="row justify-content-center">
            <img src="images/NightCityMap.jpg" alt="Map" class="img-fluid" />
        </div>
    </div>
    <p style="margin-top: 1rem;">Made available for public use by Night Corp.</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script>
        document.addEventListener('click', (event) => {
            const x = event.clientX;
            const y = event.clientY;

            const rings = Array.from({ length: 3 }, () => {
                const ring = document.createElement('div');
                ring.className = 'ping-ring';
                ring.style.left = x + 'px';
                ring.style.top  = y + 'px';
                ring.style.width  = '0px';
                ring.style.height = '0px';
                document.body.appendChild(ring);
                return ring;
            });

            anime({
                targets: rings,
                width:  ['0px', '90px'],
                height: ['0px', '90px'],
                opacity: [1, 0],
                borderWidth: ['3px', '1px'],
                delay: anime.stagger(130),
                duration: 750,
                easing: 'easeOutExpo',
                complete: () => rings.forEach(r => r.remove())
            });
        });
    </script>

    <script src="script.js"></script>
</body>

</html>
